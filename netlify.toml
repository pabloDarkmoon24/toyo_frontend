[build]
  base      = "."
  command   = "npm run build"
  publish   = "dist"

# Proxy: /api/* y /uploads/* van al backend en Railway (sin CORS)
# X-Proxy-Secret: Railway verifica este header — peticiones sin él son rechazadas
[[redirects]]
  from   = "/api/*"
  to     = "https://toyo-production.up.railway.app/api/:splat"
  status = 200
  force  = true
  [redirects.headers]
    X-Proxy-Secret = "Tx9f2Kp7vQ4nB8wLj5mF"

[[redirects]]
  from   = "/uploads/*"
  to     = "https://toyo-production.up.railway.app/uploads/:splat"
  status = 200
  force  = true
  [redirects.headers]
    X-Proxy-Secret = "Tx9f2Kp7vQ4nB8wLj5mF"

# Headers de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    # Bloquea iframes desde cualquier origen (clickjacking)
    X-Frame-Options = "DENY"
    # Impide que el navegador adivine el Content-Type
    X-Content-Type-Options = "nosniff"
    # Controla qué información de referrer se envía
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Fuerza HTTPS por 1 año con preload
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Restringe acceso a APIs de hardware
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()"
    # Evita ataques Spectre entre ventanas de distintos orígenes
    Cross-Origin-Opener-Policy = "same-origin"
    # Protege recursos de este origen para no ser embebidos por otros dominios
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP para el frontend SPA
    # unsafe-inline necesario: Vite inyecta script inline para module preload + Tailwind usa inline styles
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# Headers para archivos PWA
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"

# SPA fallback — debe ir al final
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
