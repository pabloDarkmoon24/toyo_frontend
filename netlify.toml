[build]
  base      = "."
  command   = "npm run build"
  publish   = "dist"

# Proxy: /api/* y /uploads/* van al backend en Railway (sin CORS)
[[redirects]]
  from   = "/api/*"
  to     = "https://toyo-production.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/uploads/*"
  to     = "https://toyo-production.up.railway.app/uploads/:splat"
  status = 200
  force  = true

# Headers para archivos PWA
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript"
    Cache-Control = "no-cache"

# SPA fallback — debe ir al final
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
